apiVersion: apps/v1
kind: Deployment

metadata:
  name: wisecow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: wisecow

  template:
    metadata:
      labels:
        app: wisecow

    spec:
      containers:

      - name: wisecow

        image: OJASVI/wisecow:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 4499
